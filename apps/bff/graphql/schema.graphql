scalar DateTime

# News Object
type News {
  id: ID!
  title: String!
  summary: String
  url: String!
  source: String!
  publishedAt: DateTime!
  imageUrl: String
}

# Crypto Object
type Crypto {
  id: ID!
  symbol: String!
  price: Float!
  change24h: Float
}

type Location {
  city: String!
  state: String!
  country: String!
}

type Temperature {
  celsius: Int!
  fahrenheit: Int!
}

type Weather {
  temperature: Temperature!
  condition: String!
  location: Location!
}

type Query {
  # Returns a list of news, allowing to filter by category
  getNews(category: String): [News]!

  # Returns a list of cryptos with an optional limit
  getCryptos(limit: Int): [Crypto]!

  # Returns the weather of a specific city
  getWeather(ip: String, city: String): Weather
}