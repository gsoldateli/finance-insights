scalar DateTime

# News Object
type News {
  id: ID!
  title: String!
  summary: String
  url: String!
  source: String!
  publishedAt: DateTime!
  imageUrl: String
}

# Crypto Object
type Crypto {
  id: ID!
  symbol: String!
  price: Float!
  change24h: Float
}

type Location {
  city: String!
  state: String!
  country: String!
}

type Temperature {
  celsius: Int!
  fahrenheit: Int!
}

type Weather {
  temperature: Temperature!
  condition: String!
  location: Location!
}

type GeoCoordinates {
  lat: Float!
  lng: Float!
}

type LocationResult {
  id: ID!
  name: String!
  type: String!
  city: String
  state: String
  country: String!
  coordinates: GeoCoordinates!
}

type Money {
  amount: Float!
  currency: String!
  formatted: String!
}

type CoinPerformanceMetrics {
  changeAbs: Float!          # Variação absoluta (ex: +$150.00)
  changePercent: Float!      # Variação percentual (ex: +2.5%)
  isPositive: Boolean!
  fiftyTwoWeekHigh: Float
  fiftyTwoWeekLow: Float
  allTimeHigh: Float
  athDate: String
}

type HistoryPoint {
  timestamp: Float!          # Unix timestamp para o Recharts
  price: Float!
  volume: Float
}

type CoinDetails {
  id: ID!                    # ex: "BTC-USD"
  symbol: String!            # ex: "BTC"
  name: String!              # ex: "Bitcoin"
  description: String
  iconUrl: String
  
  # Dados em Tempo Real
  currentPrice: Money!
  marketCap: Money
  volume24h: Money
  
  # Métricas de Performance Calculadas pelo BFF
  performance: CoinPerformanceMetrics!
  
  # Dados Históricos (com argumentos para filtro)
  history(period: HistoryPeriod!): [HistoryPoint!]!
}

enum HistoryPeriod {
  ONE_DAY
  SEVEN_DAYS
  ONE_MONTH
  ONE_YEAR
  ALL
}

type Query {
  coin(symbol: String!): CoinDetails

  getTrendingCoins: [CoinDetails]!
  # Returns a list of news, allowing to filter by category
  getNews(category: String): [News]!

  # Returns a list of cryptos with an optional limit
  getCryptos(limit: Int): [Crypto]!

  # Returns the weather of a specific city
  getWeather(query: String!): Weather

  searchLocations(query: String!): [LocationResult]!
}